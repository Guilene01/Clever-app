{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notesy{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="{% static 'js/editor.js' %}" defer></script>
  <script src="{% static 'js/shortcuts.js' %}" defer></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .note-card { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .note-card h3 { margin: 0 0 0.5rem 0; }
    .note-card .meta { color: #888; font-size: 0.85rem; }
    .note-card .actions { margin-top: 0.5rem; }
    .note-card .summary { background: #f5f5f5; padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem; }
    button, .btn { padding: 0.4rem 0.8rem; border: 1px solid #888; background: #fff; cursor: pointer; border-radius: 4px; }
    input, textarea { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    textarea { min-height: 6rem; font-family: inherit; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="text-decoration:none;color:inherit">Notesy</a></h1>
    {% if user.is_authenticated %}
      <div>
        <span>{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline">
          {% csrf_token %}
          <button type="submit" class="btn">Log out</button>
        </form>
      </div>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
